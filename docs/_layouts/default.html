<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - Product Horizon</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/post.css' | relative_url }}">
</head>
<body class="post-page">
    <!-- Navigation -->
    <nav class="post-nav">
        <div class="container">
            <a href="{{ '/' | relative_url }}" class="back-link">← Back to Home</a>
            <div class="logo">Product Horizon</div>
        </div>
    </nav>

    <!-- Post Content -->
    <article class="post-content">
        <div class="container">
            {{ content }}
        </div>
    </article>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Product Horizon. Powered by AI.</p>
            <p><a href="https://github.com/LemonPP-byte/Product-News" target="_blank">View on GitHub</a></p>
        </div>
    </footer>
</body>
</html>
